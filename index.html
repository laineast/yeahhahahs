<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VerseVault</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>VerseVault</h1>
    <p class="subtitle">
      Study daily. Stay consistent.
    </p>

    <div class="card">

      <h2>Today's Verse</h2>

      <p id="verse">
        “For with God nothing shall be impossible.”
      </p>

      <button onclick="studyVerse()">
        Mark as Studied
      </button>

      <h3 id="streak">
        🔥 Streak: 0
      </h3>

      <p id="message"></p>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
